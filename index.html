<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- 🔹 Viewport & Mobile Optimization -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DomusEA">

    <!-- 🔹 Theme Color - Updated to match Corporate Palette -->
    <meta name="theme-color" content="#4F46E5" />
    <meta name="msapplication-navbutton-color" content="#4F46E5" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#4F46E5" />
    
    <!-- 🔹 PWA & App Metadata -->
    <meta name="application-name" content="DomusEA" />
    <meta name="apple-mobile-web-app-title" content="DomusEA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- 🔹 Description -->
    <meta name="description" content="DomusEA - Secure Property Management Platform" />
    
    <!-- 🔹 Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- 🔹 Title -->
    <title>DomusEA</title>
    
    <!-- 🔹 Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- 🔹 Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log('✅ SW registered:', reg.scope))
            .catch(err => console.log('❌ SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
